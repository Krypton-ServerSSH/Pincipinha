<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Pincipinha ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #3e2723 0%, #1a0f0d 100%);
            overflow: hidden;
            position: relative;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #polaroid-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .polaroid {
            position: absolute;
            background: white;
            padding: 8px 8px 25px 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-radius: 2px;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 1s ease-out, transform 1s ease-out, z-index 0.3s;
            pointer-events: auto;
            cursor: pointer;
        }

        .polaroid:hover { 
            z-index: 100 !important; 
            transform: scale(1.1) rotate(0deg) !important;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .polaroid img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            display: block;
            background: #eee;
        }

        .polaroid.aparecer {
            opacity: 1;
            animation: floating var(--float-speed) ease-in-out infinite alternate;
        }

        @keyframes floating {
            0% { transform: rotate(var(--rotation)) translateY(0px); }
            100% { transform: rotate(var(--rotation)) translateY(-15px); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            z-index: 50;
            position: relative;
        }

        .envelope-anim { animation: bounce 3s ease-in-out infinite; cursor: pointer; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #b08968; border-radius: 10px; }

        #loader {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            z-index: 100;
            transition: opacity 1s;
        }
    </style>
</head>
<body class="p-4">

    <div id="loader">Preparando surpresa...</div>
    <div id="polaroid-container"></div>

    <div id="setup" class="text-center z-50 transition-all duration-700">
        <div onclick="abrirSurpresa()" class="envelope-anim active:scale-95">
            <span class="text-[100px] md:text-[120px]">🎁</span>
        </div>
        <h2 class="mt-6 text-white text-xl font-bold tracking-widest uppercase shadow-md">Para você, Pincipinha</h2>
    </div>

    <div id="carta" class="hidden opacity-0 w-full max-w-lg glass-card p-6 md:p-10 rounded-[2.5rem] text-center transition-all duration-1000 translate-y-10">
        <div class="flex justify-between items-center mb-6 border-b border-orange-100 pb-4 text-[#8d6e63] text-[10px] font-bold uppercase tracking-widest">
            <span>De: Seu Pincipinho</span>
            <span>Para: Pincipinha</span>
        </div>
        
        <h1 id="titulo" class="text-2xl font-extrabold text-[#3e2723] mb-6 text-left min-h-[1.5em]"></h1>
        
        <div class="max-h-[40vh] overflow-y-auto custom-scroll pr-3 text-left">
            <p id="mensagem" class="text-[#5d4037] text-md leading-relaxed mb-8 font-medium"></p>
            
            <div id="versiculos" class="hidden space-y-4 border-l-4 border-[#b08968] pl-4 py-3 bg-[#fdfaf5]/70 rounded-r-xl">
                <p class="text-[#3e2723] italic text-sm">
                    "Muitas mulheres são boas esposas, mas você é a melhor de todas." 
                    <span class="block font-bold not-italic mt-1">— Provérbios 31:29</span>
                </p>
                <p class="text-[#3e2723] italic text-sm">
                    "A força e a dignidade são os seus vestidos, e, quanto ao dia de amanhã, não tem preocupações." 
                    <span class="block font-bold not-italic mt-1">— Provérbios 31:25</span>
                </p>
            </div>
        </div>
        
        <div class="mt-8 text-2xl animate-pulse">🤎</div>
    </div>

    <script>
        const fotosIDs = ["1SpN9vAOa0uYThYKtskgdvvRylqZHJA71","16AGp4HrLkpel4s0Uvl3LYozfd_ymAxmN","1dAxnDS6nNeUatVYJq5NzSAUAccR5mLgp","1gkAjdg34b3eUL56jHPiLUomf3vjgo0jJ","1MP5B3bOpKoa65J2gBtL0-hhqlkWzcNk9","1amiyTnXW-uD9rV6VYHaetP56Lr0Y8cH9","1RQF3ZFnfUljRQY4POWLcdaRqaFqlsr48","1FiiU1uVPkcMHJq6XNjIgxTdyypuJ3D5C","1u1huVQWL16daCHEh-dKUHL_YDvWznCKE","1KKl5g5zJ3xwNuwaW66l4tGD_R0Hz0fEN","1uskomoeWqoYjqP8d1QzN1GohSEpIxWlP","1QrjWFUu5AWZ8TQQNFYb14Zw6EsICqJKF","1hseL4E1zcQ0Ott7_gcHlpeYEqDTFNtrL","1kS2KnwNnu6ayxWQPRReq_fgEykPMv6TI","19qx8UPaNOuJZUeEVM9sj-geGd3KL3eS0"];
        
        const linkMusica = 'https://files.catbox.moe/ffhpwy.mp3'; 
        const textoTitulo = "Oi, Pincipinha!";
        const textoPrincipal = "Pensei em escrever uma carta, mas nada melhor do que fazer uma digitalmente, né? KKKKKK!\n\nOlha, princesa, eu agradeço a Deus, de verdade, pela sua vida. Por todo esse tempo em que tenho aprendido quem você é e a te amar mais e mais a cada dia... Não é nada diferente do que você já escuta de mim, mas espero que estes presentes tenham tocado esse teu coração lindo.\n\nApesar do estresse, você é linda no falar, no olhar, no agir, e vai ficar mais linda ainda ao longo dos anos em que, em nome de Jesus, estaremos juntos!\n\nVocê é preciosa e eu te amo INFINITO!";

        const audioPlayer = new Audio();
        audioPlayer.loop = true;
        audioPlayer.preload = 'auto';

        function preloadAssets() {
            fotosIDs.forEach(id => {
                const img = new Image();
                img.src = `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
            });

            audioPlayer.src = linkMusica;
            audioPlayer.load();
            
            audioPlayer.addEventListener('canplaythrough', () => {
                const loader = document.getElementById('loader');
                if(loader) loader.innerText = "Tudo pronto! ✨";
            }, { once: true });

            setTimeout(() => {
                const loader = document.getElementById('loader');
                if(loader) loader.style.opacity = '0';
            }, 4000);
        }

        function criarPolaroids() {
            const container = document.getElementById('polaroid-container');
            const cols = 4, rows = 4;
            const cellW = 100 / cols, cellH = 100 / rows;

            fotosIDs.forEach((id, index) => {
                const div = document.createElement('div');
                div.className = 'polaroid';
                const img = document.createElement('img');
                img.src = `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
                div.appendChild(img);
                
                const col = index % cols;
                const row = Math.floor(index / cols);
                const jitterX = (Math.random() * 15 - 7.5); 
                const jitterY = (Math.random() * 15 - 7.5);

                div.style.left = `${(col * cellW) + 5 + jitterX}%`;
                div.style.top = `${(row * cellH) + 5 + jitterY}%`;
                div.style.zIndex = index;
                div.style.setProperty('--rotation', (Math.random() * 40 - 20) + "deg");
                div.style.setProperty('--float-speed', (Math.random() * 2 + 3) + "s");
                div.style.animationDelay = (Math.random() * 2) + "s";

                container.appendChild(div);
                setTimeout(() => div.classList.add('aparecer'), index * 80);
            });
        }

        function abrirSurpresa() {
            audioPlayer.play().catch(() => {
                setTimeout(() => audioPlayer.play(), 100);
            });

            confetti({ 
                particleCount: 150, 
                spread: 70, 
                origin: { y: 0.6 }, 
                colors: ['#3e2723', '#b08968', '#ffffff', '#e6ccb2'] 
            });

            criarPolaroids();

            document.getElementById('setup').classList.add('scale-0', 'opacity-0');
            setTimeout(() => {
                document.getElementById('setup').style.display = 'none';
                const carta = document.getElementById('carta');
                carta.classList.remove('hidden');
                
                setTimeout(() => {
                    carta.classList.add('opacity-100', 'translate-y-0');
                    digitar('titulo', textoTitulo, 100, () => {
                        digitar('mensagem', textoPrincipal, 40, () => {
                            document.getElementById('versiculos').classList.remove('hidden');
                        });
                    });
                }, 100);
            }, 500);
        }

        function digitar(id, texto, velocidade, callback) {
            let i = 0;
            const element = document.getElementById(id);
            element.innerHTML = "";
            function step() {
                if (i < texto.length) {
                    element.innerHTML += texto.charAt(i) === '\n' ? '<br>' : texto.charAt(i);
                    i++;
                    setTimeout(step, velocidade);
                } else if (callback) callback();
            }
            step();
        }

        preloadAssets();
    </script>
</body>
</html>
